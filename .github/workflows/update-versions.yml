name: Scheduled Version Update

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  update-submodule-and-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Update Submodules
        run: |
          git submodule update --remote --recursive

      - name: Run Generation Script
        run: |
          ./get-soh-versions.sh 

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update submodules and generated files"
          branch: auto-update/versions
          title: "🤖 Automated Versions Update"
          body: |
            This is an automated PR to sync submodules and update autogenerated files.

            - Submodules updated to latest commits.
            - Generation script executed.
          labels: |
            automated-pr
            dependencies
          delete-branch: true
