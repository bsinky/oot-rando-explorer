<html>
    {{ template "head" }}
    <body>
        {{ template "banner.html" . }}
        <h2>Version: {{ .Seed.Version }}</h2>
        <h2 class="hash-icons-2x">
            {{ range fileHashIcons .Seed.FileHash }}
                <img src="{{.}}"/>
            {{end}}
        </h2>
        <section class="center-text">
            <div class="uploadTime">Uploaded {{ .Seed.CreatedAt }}</div>
        </section>
        <section>
            <a class="button download-button" href="/download/{{ .Seed.FileHash }}">Download</a>
        </section>
        {{ template "seedrank" . }}
        <h2>Settings</h2>
        <div class="randoSettings">
            {{ range .Seed.Settings }}
                <div class="seedSetting">
                    <label>{{ .Label }}</label>
                    <div class="settingValue">{{ .Value }}</div>
                </div>
            {{ end}}
        </div>
        <div>
            <div>All settings:</div>
            <textarea class="raw-settings" disabled rows="30" cols="80">{{ .Seed.RawSettings.SettingsJSON }}</textarea>
        </div>
    </body>
</html>
