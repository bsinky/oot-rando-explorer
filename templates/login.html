{{ define "userform" }}
    <div>
        <label for="username">Username</label>
        <input name="username" type="text" required="" maxlength="30"/>
        <label class="username-errors"></label>
    </div>
    <div>
        <label for="password">Password</label>
        <input name="password" type="password" required="" maxlength="100"/>
        <label class="password-errors"></label>
    </div>
    <!-- TODO: CAPTCHA -->
{{ end }}

<html>
    {{ template "head" }}
    <body>
        {{ template "banner.html" . }}
        <h1>Sign In</h1>
        <div class="login-form">
            <form id="login-form" action="/login/auth" method="POST">
                {{ template "userform" }}
                <button type="submit">Login</button>
            </form>
        </div>

        <hr/>
        <h2>Or</h2>
        <hr/>

        <h1>Sign Up</h1>
        <div class="signup-form">
            <form id="signup-form" action="/signup/register" method="POST">
                {{ template "userform" }}
                <button type="submit">Sign Up</button>
            </form>
        </div>
    </body>
</html>
