{{ define "seedwithuploadtime" }}
<div>
    <a href="/s/{{ .FileHash }}" class="hash-icons">
        {{ range fileHashIcons .FileHash }}
            <img src="{{.}}"/>
        {{end}}
    <span class="recent-seed-info">
        {{ .CachedVersion }} <i>({{ .FormattedUploadTime }})</i>
    </span>
    </a>
</div>
{{ end }}
